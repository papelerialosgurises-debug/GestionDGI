services:
  frontend:
    container_name: ${FRONTEND_NAME:-gestiondgi-frontend}
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-/api}
    ports:
      - "${FRONTEND_PORT:-8095}:80"
    depends_on:
      - backend
    restart: unless-stopped

  backend:
    container_name: ${BACKEND_NAME:-gestiondgi-backend}
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      PORT: 3001
      DATABASE_URL: ${DATABASE_URL:-postgresql://gestiondgi:gestiondgi_password@db:5432/gestiondgi?schema=public}
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  db:
    container_name: ${POSTGRES_NAME:-gestiondgi-postgres}
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-gestiondgi}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-gestiondgi_password}
      POSTGRES_DB: ${POSTGRES_DB:-gestiondgi}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-gestiondgi} -d ${POSTGRES_DB:-gestiondgi}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  postgres_data:
